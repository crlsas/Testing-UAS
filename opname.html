<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Opname - Smart Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body class="bg-gray-100 flex">
    <aside class="w-64 bg-blue-900 min-h-screen text-white p-6 shadow-xl">
      <h1 class="text-2xl font-bold mb-10 flex items-center"><i class="fas fa-boxes-stacked mr-3 text-yellow-400"></i> WMS Pro</h1>
      <nav class="space-y-4 text-sm">
        <a href="index.html" class="block p-3 hover:bg-blue-800 rounded-lg transition"><i class="fas fa-chart-line mr-2"></i> Dashboard</a>
        <a href="inventory.html" class="block p-3 hover:bg-blue-800 rounded-lg transition"><i class="fas fa-box-open mr-2"></i> Inventaris</a>
        <a href="opname.html" class="block bg-blue-800 p-3 rounded-lg border-l-4 border-yellow-400 font-semibold"><i class="fas fa-clipboard-check mr-2"></i> Stock Opname</a>
        <a href="reports.html" class="block p-3 hover:bg-blue-800 rounded-lg transition"><i class="fas fa-file-contract mr-2"></i> Laporan</a>
      </nav>
    </aside>

    <main class="flex-1 p-8">
      <header class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Stock Opname</h2>
        <p class="text-gray-500">Bandingkan stok sistem dengan perhitungan fisik di gudang.</p>
      </header>

      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="p-4 font-semibold text-gray-600">Produk</th>
              <th class="p-4 font-semibold text-gray-600 text-center">Stok Sistem</th>
              <th class="p-4 font-semibold text-gray-600 text-center w-40">Stok Fisik</th>
              <th class="p-4 font-semibold text-gray-600 text-center">Selisih</th>
              <th class="p-4 font-semibold text-gray-600 text-right">Aksi</th>
            </tr>
          </thead>
          <tbody id="opname-table-body"></tbody>
        </table>
      </div>

      <div class="mt-6 flex justify-end">
        <button onclick="saveAllOpname()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-green-700 shadow-lg transition">Selesaikan Opname & Update Sistem</button>
      </div>
    </main>

    <script>
      let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

      function renderOpnameTable() {
        const body = document.getElementById("opname-table-body");
        body.innerHTML = "";

        inventory.forEach((item, index) => {
          body.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 font-bold text-gray-700">${item.name}</td>
                        <td class="p-4 text-center font-mono text-blue-600 font-bold">${item.stock}</td>
                        <td class="p-4 text-center">
                            <input type="number" 
                                   oninput="calculateDiff(${index}, this.value)" 
                                   placeholder="0"
                                   class="w-24 border-2 border-gray-200 p-2 rounded-lg text-center focus:border-blue-500 outline-none">
                        </td>
                        <td class="p-4 text-center">
                            <span id="diff-${index}" class="font-bold text-gray-400">--</span>
                        </td>
                        <td class="p-4 text-right">
                            <span id="status-${index}" class="text-xs font-bold uppercase tracking-widest text-gray-300">Belum Dicek</span>
                        </td>
                    </tr>
                `;
        });
      }

      function calculateDiff(index, fisikValue) {
        const sistem = inventory[index].stock;
        const diffElement = document.getElementById(`diff-${index}`);
        const statusElement = document.getElementById(`status-${index}`);

        if (fisikValue === "") {
          diffElement.innerText = "--";
          diffElement.className = "font-bold text-gray-400";
          statusElement.innerText = "Belum Dicek";
          statusElement.className = "text-xs font-bold text-gray-300";
          return;
        }

        const selisih = fisikValue - sistem;
        diffElement.innerText = selisih > 0 ? `+${selisih}` : selisih;

        if (selisih === 0) {
          diffElement.className = "font-bold text-green-600";
          statusElement.innerText = "Sesuai";
          statusElement.className = "text-xs font-bold text-green-500";
        } else {
          diffElement.className = "font-bold text-red-600";
          statusElement.innerText = "Selisih";
          statusElement.className = "text-xs font-bold text-red-500";
        }
      }

      function saveAllOpname() {
        // Dalam proyek asli, di sini kita akan mengupdate stok sistem berdasarkan input fisik
        // Untuk simulasi pengujian, kita berikan feedback sukses
        alert("Hasil Opname Berhasil Disimpan. Stok sistem akan disesuaikan.");
        // Logika: inventory[index].stock = fisikValue;
      }

      window.onload = renderOpnameTable;
    </script>
  </body>
</html>
