<?php
session_start();

// 1. PROTEKSI HALAMAN (Auth Guard)
if (!isset($_SESSION['username'])) {
    header("Location: login.php");
    exit();
}

include 'config.php'; 

// 2. LOGIKA TAMBAH PRODUK (Create)
if (isset($_POST['save_product'])) {
    $name = mysqli_real_escape_string($conn, $_POST['prodName']);
    $cat  = mysqli_real_escape_string($conn, $_POST['prodCat']);
    $qty  = $_POST['prodQty'];
    $rak  = mysqli_real_escape_string($conn, $_POST['prodRak']);

    // Query menyesuaikan dengan struktur tabel db_gudang kamu
    $query = "INSERT INTO produk (nama_produk, kategori, stok_sistem, lokasi_rak) 
              VALUES ('$name', '$cat', '$qty', '$rak')";
    
    if (mysqli_query($conn, $query)) {
        header("Location: inventory.php?status=success");
        exit();
    } else {
        echo "Error: " . mysqli_error($conn);
    }
}

// 3. LOGIKA HAPUS PRODUK (Delete)
if (isset($_GET['delete'])) {
    $id = $_GET['delete'];
    mysqli_query($conn, "DELETE FROM produk WHERE id_produk = $id");
    header("Location: inventory.php");
    exit();
}

// 4. AMBIL DATA DARI DATABASE (Read)
$result = mysqli_query($conn, "SELECT * FROM produk ORDER BY id_produk DESC");
?>
